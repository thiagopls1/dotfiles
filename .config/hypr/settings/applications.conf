###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin
$menu = rofi
$browser = firefox
$user = thiago_lins
$HOME = /home/$USER
$steam = env LD_PRELOAD=/usr/lib32/libextest.so mangohud /usr/bin/steam
$whatsApp = env QT_STYLE_OVERRIDE=breeze zapzap
$hyprshell = hyprshell run

################
### SERVICES ###
################

exec-once = qs -c noctalia-shell
exec-once = easyeffects -w
exec-once = openrgb -p Default
exec-once = openrgb --startminimzed
exec-once = flameshot
exec-once = kdeconnectd
exec-once = hyprctl setcursor $cursorTheme 1
exec-once = sway-audio-idle-inhibit
exec-once = $hyprshell

#################
### AUTOSTART ###
#################

exec-once = [workspace 6 silent] spotify-launcher
exec-once = [workspace 5 silent] thunderbird
exec-once = [workspace 2 silent] $browser
exec-once = [workspace 3 silent] discord
exec-once = [workspace 3 silent] $whatsApp
exec-once = [workspace 4 silent] $steam
