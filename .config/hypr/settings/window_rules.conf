##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule = match:fullscreen true, border_size 0

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# Fix some dragging issues with XWayland
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Flameshot Rules
windowrule {
	name = flameshot-rules
	match:class = ^(flameshot)$
	fullscreen = off
	no_anim = on
	float = on
}

# Firefox Rules
windowrule {
	name = firefox-pip
	match:class = (firefox)
	match:title = (Picture-in-Picture)
	float = on
	pin = on
}

windowrule {
	name = firefox-bitwarden
	match:title = [Bb]itwarden
	float = on
}

# Opacities
windowrule {
	name = opacities
	match:class = ^(kitty)
	opacity = 0.95 0.95
}

# Steam rules
windowrule {
	name = steam-apps-rules
	match:class = steam
	workspace = 4 silent
	float = on
	rounding = 0
}

windowrule {
	name = steam-rules
	match:class = steam
	match:title = Steam
	rounding = 5
	tile = on
}

windowrule {
	name = steam-bp-rules
	match:class = steam
	match:title = Big Picture
	fullscreen = on
}

# Discord Rules
windowrule {
	name = discord-rules
	match:class = discord
	workspace = 3 silent
}

# Games rules
windowrule {
	name = game-rules
	match:class = (steam_app_.*)|([Gg]ame)|(launcher.*)
	rounding = 0
	border_size = 0
	float = on
}

# GPU Screen Recorder
windowrule {
	name = gsr-rules
	match:title = gsr ui
	fullscreen = on
	fullscreen_state = 3 3
	pin = on
	float = on
	rounding = 0
}

# Kshutdown Rules
windowrule {
	name = kshutdown
	match:class = kshutdown
	float = on
}

# Workspaces rules
windowrule {
	name = float-workspace-magic
	match:workspace = name:special:magic
	float = on
}

layerrule {
  name = noctalia
  match:namespace = noctalia-background-.*$
  ignore_alpha = 0.5
  blur = true
  blur_popups = true
}

misc {
	exit_window_retains_fullscreen = false
}
