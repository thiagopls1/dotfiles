##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule = match:fullscreen true, border_size 0

# Ignore maximize requests from apps. You'll probably like this.
windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

# Fix some dragging issues with XWayland
windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Flameshot Rules
windowrule {
	name = flameshot-rules
	match:class = ^(flameshot)$
	fullscreen = off
	no_anim = on
	float = on
}

windowrule {
	name = firefox-pip
	match:class = (firefox)
	match:title = (Picture-in-Picture)
	float = on
	pin = on
}

windowrule {
	name = firefox-bitwarden
	match:class = firefox
	match:title = ([Bb]itwarden)
	float = on
}

# Opacities
windowrule {
	name = opacities
	match:class = ^(kitty)
	opacity = 0.95 0.95
}

# System rules
windowrule {
	name = pavucontrol-rules
	match:class = (org\.pulseaudio\.pavucontrol)
	float = on
	pin = on
}

windowrule {
	name = nm-connection-rules
	match:class = (nm-connection-editor)
	float = on
	pin = on
}

windowrule {
	name = blueman-rules
	match:class = (blueman-manager)
	float = on
	pin = on
}

windowrule {
	name = rofi-rules
	match:class = (Rofi)
	pin = on
}

# Steam rules
windowrule {
	name = steam-apps-rules
	match:class = steam
	workspace = 4 silent
	float = on
	rounding = 0
}

windowrule {
	name = steam-rules
	match:class = steam
	match:title = Steam
	rounding = 5
	tile = on
}

windowrule {
	name = steam-bp-rules
	match:class = steam
	match:title = Big Picture
	fullscreen = on
}

# Discord Rules
windowrule {
	name = discord-rules
	match:class = discord
	workspace = 3
}

# Games rules
windowrule {
	name = game-rules
	match:class = (steam_app_.*)|([Gg]ame)|(launcher.*)
	rounding = 0
	border_size = 0
}

# GPU Screen Recorder
windowrule {
	name = gsr-rules
	match:title = gsr ui
	fullscreen = on
	fullscreen_state = 2 2
	pin = on
	float = on
	rounding = 0
}

# Workspaces rules
windowrule {
	name = workspace-rules
	match:workspace = name:special:magic
	float = on
}

misc {
	exit_window_retains_fullscreen = false
}
