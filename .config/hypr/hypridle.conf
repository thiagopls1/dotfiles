$ipc = qs -c noctalia-shell ipc call

general {
    lock_cmd = $ipc lockScreen lock
    before_sleep_cmd = $ipc lockScreen lock    # lock before suspend.
    after_sleep_cmd = hyprctl dispatch dpms on && openrgb -p Default  # to avoid having to press a key twice to turn on the display.
}

listener {
  timeout = 615
  on-timeout = $ipc brightness set 75    # set monitor backlight to minimum, avoid 0 on OLED monitor.
  on-resume = $ipc brightness set 100    # monitor backlight restore.
}

listener {
  timeout = 630                               # 5min
  on-timeout = $ipc lockScreen lock           # lock screen when timeout has passed
}

listener {
  timeout = 645                               # 5min
  on-timeout = hyprctl dispatch dpms off      # screen off when timeout has passed
  on-resume = hyprctl dispatch dpms on        # screen on when activity is detected after timeout has fired.
}

listener {
  timeout = 1200                              # 30min
  on-timeout = systemctl suspend              # suspend pc
	on-resume = hyprctl hyprsunset gamma 100
}
